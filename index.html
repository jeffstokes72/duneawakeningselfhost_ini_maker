<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrakis Server Config Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        spice: {
                            50: '#fffbeb',
                            100: '#fef3c7',
                            500: '#f59e0b',
                            600: '#d97706',
                            900: '#78350f',
                        },
                        desert: '#121110'
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar to match the theme */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1c1a19; }
        ::-webkit-scrollbar-thumb { background: #d97706; border-radius: 3px; }
    </style>
</head>
<body class="bg-desert text-stone-200 font-sans min-h-screen antialiased selection:bg-spice-600 selection:text-white">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <header class="mb-8 border-b border-stone-800 pb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-3xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-spice-500 to-orange-400 uppercase">
                    Arrakis Orchestrator
                </h1>
                <p class="text-sm text-stone-500 mt-1">Dune: Awakening Server Configuration Utility</p>
            </div>
            <div class="flex items-center gap-2 bg-stone-900/60 border border-stone-800 px-3 py-1.5 rounded-md text-xs font-mono">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span class="text-stone-400">Stack Status: Operational</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-5 bg-stone-900/40 border border-stone-800/80 p-6 rounded-xl shadow-xl h-fit">
                <h2 class="text-lg font-semibold text-stone-300 mb-6 flex items-center gap-2">
                    Control Parameters
                </h2>
                
                <form id="configForm" class="space-y-6">
                    <div>
                        <label class="block text-xs font-semibold tracking-wider uppercase text-stone-400 mb-2">Server Identity</label>
                        <input type="text" id="serverName" value="Spice Haven" 
                               class="w-full bg-stone-950 border border-stone-800 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-spice-500 transition-colors text-white">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold tracking-wider uppercase text-stone-400 mb-2">Max Players</label>
                            <input type="number" id="maxPlayers" value="40" min="1" max="100"
                                   class="w-full bg-stone-950 border border-stone-800 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-spice-500 transition-colors text-white">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold tracking-wider uppercase text-stone-400 mb-2">Tick Rate (Hz)</label>
                            <input type="number" id="tickRate" value="30" min="20" max="60"
                                   class="w-full bg-stone-950 border border-stone-800 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-spice-500 transition-colors text-white">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold tracking-wider uppercase text-stone-400 mb-2">Build Limit Mult.</label>
                            <input type="number" id="buildLimit" value="1.0" step="0.1" min="0.1" max="5.0"
                                   class="w-full bg-stone-950 border border-stone-800 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-spice-500 transition-colors text-white">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold tracking-wider uppercase text-stone-400 mb-2">Harvest Yield Mult.</label>
                            <input type="number" id="miningRate" value="1.0" step="0.1" min="0.1" max="5.0"
                                   class="w-full bg-stone-950 border border-stone-800 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-spice-500 transition-colors text-white">
                        </div>
                    </div>

                    <div class="border-t border-stone-800/60 pt-4 space-y-3">
                        <label class="block text-xs font-semibold tracking-wider uppercase text-stone-400 mb-2">World System Overrides</label>
                        
                        <label class="flex items-center justify-between p-3 bg-stone-950/40 border border-stone-800/40 rounded-lg cursor-pointer hover:border-stone-700 transition-colors">
                            <span class="text-sm text-stone-300">Apex Sandworm Tracking</span>
                            <input type="checkbox" id="sandworms" checked class="accent-spice-500 h-4 w-4 rounded">
                        </label>

                        <label class="flex items-center justify-between p-3 bg-stone-950/40 border border-stone-800/40 rounded-lg cursor-pointer hover:border-stone-700 transition-colors">
                            <span class="text-sm text-stone-300">Deep Desert Coriolis Cycles</span>
                            <input type="checkbox" id="coriolis" checked class="accent-spice-500 h-4 w-4 rounded">
                        </label>

                        <label class="flex items-center justify-between p-3 bg-stone-950/40 border border-stone-800/40 rounded-lg cursor-pointer hover:border-stone-700 transition-colors">
                            <span class="text-sm text-stone-300">Dynamic Map Sandstorms</span>
                            <input type="checkbox" id="sandstorms" checked class="accent-spice-500 h-4 w-4 rounded">
                        </label>

                        <label class="flex items-center justify-between p-3 bg-stone-950/40 border border-stone-800/40 rounded-lg cursor-pointer hover:border-stone-700 transition-colors">
                            <span class="text-sm text-stone-300">Open World PvP Engagement</span>
                            <input type="checkbox" id="pvp" checked class="accent-spice-500 h-4 w-4 rounded">
                        </label>
                    </div>
                </form>
            </div>

            <div class="lg:col-span-7 space-y-6">
                
                <div class="bg-stone-900/20 border border-stone-800 rounded-xl overflow-hidden shadow-xl">
                    <div class="bg-stone-900/60 border-b border-stone-800 px-5 py-3.5 flex justify-between items-center">
                        <span class="font-mono text-xs font-bold tracking-wider text-stone-400 uppercase">UserEngine.ini</span>
                        <button onclick="copyToClipboard('engineOutput', this)" class="px-3 py-1 bg-stone-800 hover:bg-spice-600 border border-stone-700 hover:border-spice-500 rounded text-xs transition-all font-medium text-stone-300 hover:text-white">
                            Copy File
                        </button>
                    </div>
                    <div class="p-4 bg-stone-950">
                        <pre id="engineOutput" class="font-mono text-sm text-stone-300 whitespace-pre-wrap select-all block max-h-[220px] overflow-y-auto"></pre>
                    </div>
                </div>

                <div class="bg-stone-900/20 border border-stone-800 rounded-xl overflow-hidden shadow-xl">
                    <div class="bg-stone-900/60 border-b border-stone-800 px-5 py-3.5 flex justify-between items-center">
                        <span class="font-mono text-xs font-bold tracking-wider text-stone-400 uppercase">UserGame.ini</span>
                        <button onclick="copyToClipboard('gameOutput', this)" class="px-3 py-1 bg-stone-800 hover:bg-spice-600 border border-stone-700 hover:border-spice-500 rounded text-xs transition-all font-medium text-stone-300 hover:text-white">
                            Copy File
                        </button>
                    </div>
                    <div class="p-4 bg-stone-950">
                        <pre id="gameOutput" class="font-mono text-sm text-stone-300 whitespace-pre-wrap select-all block max-h-[320px] overflow-y-auto"></pre>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('configForm');
        
        function updateConfigs() {
            // Grab current UI inputs
            const serverName = document.getElementById('serverName').value;
            const maxPlayers = document.getElementById('maxPlayers').value || 40;
            const tickRate = document.getElementById('tickRate').value || 30;
            const buildLimit = parseFloat(document.getElementById('buildLimit').value || 1.0).toFixed(1);
            const miningRate = parseFloat(document.getElementById('miningRate').value || 1.0).toFixed(1);
            
            const sandworms = document.getElementById('sandworms').checked ? "True" : "False";
            const coriolis = document.getElementById('coriolis').checked ? "True" : "False";
            const sandstorms = document.getElementById('sandstorms').checked ? "True" : "False";
            const pvp = document.getElementById('pvp').checked ? "True" : "False";

            // Process UserEngine.ini Template
            const engineTemplate = `[/Script/OnlineSubsystemUtils.IpNetDriver]
MaxClientRate=100000
MaxInternetClientRate=100000
NetServerMaxTickRate=${tickRate}

[SystemSettings]
p.NetMaxTickRate=${tickRate}
p.ServerTickRate=${tickRate}`;

            // Process UserGame.ini Template
            const gameTemplate = `[/Script/Dune.DuneGameMode]
ServerName="${serverName}"
MaxPlayers=${maxPlayers}
bEnableSandworms=${sandworms}
bEnableCoriolisStorms=${coriolis}
bEnableSandstorms=${sandstorms}
bEnablePvP=${pvp}
BuildLimitMultiplier=${buildLimit}
MiningRateMultiplier=${miningRate}
InitialSpawnProtectionTime=10.0`;

            // Inject back to DOM
            document.getElementById('engineOutput').textContent = engineTemplate;
            document.getElementById('gameOutput').textContent = gameTemplate;
        }

        function copyToClipboard(elementId, button) {
            const text = document.getElementById(elementId).textContent;
            navigator.clipboard.writeText(text).then(() => {
                const originalText = button.textContent;
                button.textContent = 'Copied!';
                button.classList.remove('bg-stone-800', 'border-stone-700');
                button.classList.add('bg-emerald-600', 'border-emerald-500', 'text-white');
                
                setTimeout(() => {
                    button.textContent = originalText;
                    button.classList.add('bg-stone-800', 'border-stone-700');
                    button.classList.remove('bg-emerald-600', 'border-emerald-500');
                }, 1500);
            });
        }

        // Initialize event listeners for seamless reactivity
        form.addEventListener('input', updateConfigs);
        // Fire initialization on run
        updateConfigs();
    </script>
</body>
</html>
