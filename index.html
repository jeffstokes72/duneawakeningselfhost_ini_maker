<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrakis Server Config Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        spice: {
                            50: '#fffbeb',
                            100: '#fef3c7',
                            500: '#f59e0b',
                            600: '#d97706',
                            900: '#78350f',
                        },
                        desert: '#121110'
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1c1a19; }
        ::-webkit-scrollbar-thumb { background: #d97706; border-radius: 3px; }
    </style>
</head>
<body class="bg-desert text-stone-200 font-sans min-h-screen antialiased selection:bg-spice-600 selection:text-white">

    <div class="max-w-[90rem] mx-auto px-4 py-8">
        <header class="mb-8 border-b border-stone-800 pb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-3xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-spice-500 to-orange-400 uppercase">
                    Arrakis Orchestrator
                </h1>
                <p class="text-sm text-stone-500 mt-1">Expanded Dune: Awakening Configuration Utility</p>
            </div>
            <div class="flex items-center gap-2 bg-stone-900/60 border border-stone-800 px-3 py-1.5 rounded-md text-xs font-mono">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span class="text-stone-400">Stack Status: Operational</span>
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">
            
            <div class="xl:col-span-7 bg-stone-900/40 border border-stone-800/80 p-6 rounded-xl shadow-xl h-fit">
                <h2 class="text-lg font-semibold text-stone-300 mb-6 flex items-center gap-2">
                    Control Parameters
                </h2>
                
                <form id="configForm" class="space-y-6">
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold tracking-wider uppercase text-stone-400 mb-2">Server Identity</label>
                            <input type="text" id="serverName" value="Spice Haven" 
                                   class="w-full bg-stone-950 border border-stone-800 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-spice-500 transition-colors text-white">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-semibold tracking-wider uppercase text-stone-400 mb-2">Join Password</label>
                                <input type="text" id="serverPwd" placeholder="Leave blank for public"
                                       class="w-full bg-stone-950 border border-stone-800 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-spice-500 transition-colors text-white">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold tracking-wider uppercase text-stone-400 mb-2">Admin Password</label>
                                <input type="password" id="adminPwd" placeholder="Admin commands auth"
                                       class="w-full bg-stone-950 border border-stone-800 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-spice-500 transition-colors text-white">
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-4 border-t border-stone-800/60 pt-6">
                        <div>
                            <label class="block text-xs font-semibold tracking-wider uppercase text-stone-400 mb-2">Max Players</label>
                            <input type="number" id="maxPlayers" value="40" min="1" max="100"
                                   class="w-full bg-stone-950 border border-stone-800 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-spice-500 transition-colors text-white">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold tracking-wider uppercase text-stone-400 mb-2">Tick Rate (Hz)</label>
                            <input type="number" id="tickRate" value="30" min="20" max="60"
                                   class="w-full bg-stone-950 border border-stone-800 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-spice-500 transition-colors text-white">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold tracking-wider uppercase text-stone-400 mb-2">Spawn Prot. (s)</label>
                            <input type="number" id="spawnProtection" value="10" min="0" max="60"
                                   class="w-full bg-stone-950 border border-stone-800 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-spice-500 transition-colors text-white">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 border-t border-stone-800/60 pt-6">
                        <div>
                            <label class="block text-xs font-semibold tracking-wider uppercase text-stone-400 mb-2" title="Multiplier for tools like Cutteray">Handheld Mining</label>
                            <input type="number" id="miningRate" value="1.0" step="0.1" min="0.1" max="10.0"
                                   class="w-full bg-stone-950 border border-stone-800 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-spice-500 transition-colors text-white">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold tracking-wider uppercase text-stone-400 mb-2" title="Multiplier for ground vehicle mining lasers">Vehicle Mining</label>
                            <input type="number" id="vehicleMining" value="1.0" step="0.1" min="0.1" max="10.0"
                                   class="w-full bg-stone-950 border border-stone-800 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-spice-500 transition-colors text-white">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold tracking-wider uppercase text-stone-400 mb-2" title="Bonus gathering in contested PvP zones">PvP Res. Bonus</label>
                            <input type="number" id="pvpResource" value="1.0" step="0.1" min="0.1" max="10.0"
                                   class="w-full bg-stone-950 border border-stone-800 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-spice-500 transition-colors text-white">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold tracking-wider uppercase text-stone-400 mb-2">Build Limit</label>
                            <input type="number" id="buildLimit" value="1.0" step="0.1" min="0.1" max="5.0"
                                   class="w-full bg-stone-950 border border-stone-800 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-spice-500 transition-colors text-white">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 border-t border-stone-800/60 pt-6">
                        <div>
                            <label class="block text-xs font-semibold tracking-wider uppercase text-stone-400 mb-2">Ping Max Range (m)</label>
                            <input type="number" id="pingDistance" value="2000" min="500" max="10000"
                                   class="w-full bg-stone-950 border border-stone-800 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-spice-500 transition-colors text-white">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold tracking-wider uppercase text-stone-400 mb-2">Ping Map Expiry (s)</label>
                            <input type="number" id="pingExpiry" value="60" min="10" max="300"
                                   class="w-full bg-stone-950 border border-stone-800 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-spice-500 transition-colors text-white">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold tracking-wider uppercase text-stone-400 mb-2" title="How far up the server traces to determine if a player is 'indoors' to survive a storm">Shelter Trace (cm)</label>
                            <input type="number" id="shelterTrace" value="10000" min="1000" max="50000"
                                   class="w-full bg-stone-950 border border-stone-800 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-spice-500 transition-colors text-white">
                        </div>
                    </div>

                    <div class="border-t border-stone-800/60 pt-6 space-y-5">
                        
                        <div>
                            <label class="block text-xs font-semibold tracking-wider uppercase text-stone-400 mb-3">Arrakis Threat Systems</label>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                                <label class="flex items-center justify-between p-3 bg-stone-950/40 border border-stone-800/40 rounded-lg cursor-pointer hover:border-stone-700 transition-colors">
                                    <span class="text-sm text-stone-300">Sandworms</span>
                                    <input type="checkbox" id="sandworms" checked class="accent-spice-500 h-4 w-4 rounded">
                                </label>
                                <label class="flex items-center justify-between p-3 bg-stone-950/40 border border-stone-800/40 rounded-lg cursor-pointer hover:border-stone-700 transition-colors">
                                    <span class="text-sm text-stone-300">Coriolis Wipes</span>
                                    <input type="checkbox" id="coriolis" checked class="accent-spice-500 h-4 w-4 rounded">
                                </label>
                                <label class="flex items-center justify-between p-3 bg-stone-950/40 border border-stone-800/40 rounded-lg cursor-pointer hover:border-stone-700 transition-colors">
                                    <span class="text-sm text-stone-300">Sandstorms</span>
                                    <input type="checkbox" id="sandstorms" checked class="accent-spice-500 h-4 w-4 rounded">
                                </label>
                                <label class="flex items-center justify-between p-3 bg-stone-950/40 border border-stone-800/40 rounded-lg cursor-pointer hover:border-stone-700 transition-colors">
                                    <span class="text-sm text-stone-300">PvP Rules</span>
                                    <input type="checkbox" id="pvp" checked class="accent-spice-500 h-4 w-4 rounded">
                                </label>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-semibold tracking-wider uppercase text-stone-400 mb-3">Advanced Engine & Netcode Systems</label>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                                <label class="flex items-center justify-between p-3 bg-stone-950/40 border border-stone-800/40 rounded-lg cursor-pointer hover:border-stone-700 transition-colors" title="Protects against player speed/movement exploits">
                                    <span class="text-sm text-stone-300">Move Discrepancy Anticheat</span>
                                    <input type="checkbox" id="anticheat" checked class="accent-spice-500 h-4 w-4 rounded">
                                </label>
                                <label class="flex items-center justify-between p-3 bg-stone-950/40 border border-stone-800/40 rounded-lg cursor-pointer hover:border-stone-700 transition-colors" title="Allows characters to be transferred across interconnected servers in Hagga Basin">
                                    <span class="text-sm text-stone-300">Cross-Server Char Transfer</span>
                                    <input type="checkbox" id="charTransfer" class="accent-spice-500 h-4 w-4 rounded">
                                </label>
                                <label class="flex items-center justify-between p-3 bg-stone-950/40 border border-stone-800/40 rounded-lg cursor-pointer hover:border-stone-700 transition-colors" title="Shows map markers globally across instanced zones">
                                    <span class="text-sm text-stone-300">Share Cross-Dim Markers</span>
                                    <input type="checkbox" id="shareMarkers" checked class="accent-spice-500 h-4 w-4 rounded">
                                </label>
                            </div>
                        </div>

                    </div>
                </form>
            </div>

            <div class="xl:col-span-5 space-y-6">
                
                <div class="bg-stone-900/20 border border-stone-800 rounded-xl overflow-hidden shadow-xl">
                    <div class="bg-stone-900/60 border-b border-stone-800 px-5 py-3.5 flex justify-between items-center">
                        <span class="font-mono text-xs font-bold tracking-wider text-stone-400 uppercase">UserEngine.ini</span>
                        <button onclick="copyToClipboard('engineOutput', this)" class="px-3 py-1 bg-stone-800 hover:bg-spice-600 border border-stone-700 hover:border-spice-500 rounded text-xs transition-all font-medium text-stone-300 hover:text-white">
                            Copy File
                        </button>
                    </div>
                    <div class="p-4 bg-stone-950">
                        <pre id="engineOutput" class="font-mono text-[0.8rem] leading-tight text-stone-300 whitespace-pre-wrap select-all block max-h-[250px] overflow-y-auto"></pre>
                    </div>
                </div>

                <div class="bg-stone-900/20 border border-stone-800 rounded-xl overflow-hidden shadow-xl">
                    <div class="bg-stone-900/60 border-b border-stone-800 px-5 py-3.5 flex justify-between items-center">
                        <span class="font-mono text-xs font-bold tracking-wider text-stone-400 uppercase">UserGame.ini</span>
                        <button onclick="copyToClipboard('gameOutput', this)" class="px-3 py-1 bg-stone-800 hover:bg-spice-600 border border-stone-700 hover:border-spice-500 rounded text-xs transition-all font-medium text-stone-300 hover:text-white">
                            Copy File
                        </button>
                    </div>
                    <div class="p-4 bg-stone-950">
                        <pre id="gameOutput" class="font-mono text-[0.8rem] leading-tight text-stone-300 whitespace-pre-wrap select-all block max-h-[500px] overflow-y-auto"></pre>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('configForm');
        
        function updateConfigs() {
            // Grab Text Inputs
            const serverName = document.getElementById('serverName').value;
            const serverPwd = document.getElementById('serverPwd').value;
            const adminPwd = document.getElementById('adminPwd').value;
            
            // Grab Core Numeric Inputs
            const maxPlayers = document.getElementById('maxPlayers').value || 40;
            const tickRate = document.getElementById('tickRate').value || 30;
            const spawnProtection = document.getElementById('spawnProtection').value || 10;
            
            // Grab Multipliers
            const buildLimit = parseFloat(document.getElementById('buildLimit').value || 1.0).toFixed(1);
            const miningRate = parseFloat(document.getElementById('miningRate').value || 1.0).toFixed(1);
            const vehicleMining = parseFloat(document.getElementById('vehicleMining').value || 1.0).toFixed(1);
            const pvpResource = parseFloat(document.getElementById('pvpResource').value || 1.0).toFixed(1);
            
            // Grab Advanced Numerics
            const pingDistance = document.getElementById('pingDistance').value || 2000;
            const pingExpiry = document.getElementById('pingExpiry').value || 60;
            const shelterTrace = document
